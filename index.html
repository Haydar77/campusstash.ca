<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Stash - Coming Soon</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 60px 20px; 
            /* This ensures the page background perfectly blends with your image */
            background-color: #ffffff; 
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .logo-wrapper {
            display: inline-block;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .logo { 
            max-width: 100%; 
            height: auto; 
            width: 400px; 
            display: block;
            /* This trims away 3% from the left and right edges directly in the browser */
            clip-path: inset(0% 3% 0% 3%);
        }
        h1 { 
            color: #1e293b; 
            font-size: 32px;
            margin-bottom: 10px;
            margin-top: 20px;
        }
        p { 
            color: #64748b; 
            font-size: 18px; 
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo container with safety mask -->
        <div class="logo-wrapper">
            <img src="logo.jpg" alt="Campus Stash Logo" class="logo">
        </div>
        
        <h1>Our Website is Coming Soon</h1>
        <p>We are busy setting up the ultimate student storage experience. Please check back later!</p>
    </div>
</body>
</html>
